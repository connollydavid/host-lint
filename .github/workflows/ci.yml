name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    # semver release tags only — a bare `v*` also matches the `vendor-vN` bundle
    # tags this repo publishes, which would fire the release job on a bundle tag.
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: host-lint-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: host-lint-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: host-lint-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: host-lint-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: host-lint-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: host-lint-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage binaries
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/host-lint"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.name }}"
          # The ffmpeg pack ships beside the core from the same workspace build
          # (host-lint#22, workspace-split), named by the same platform scheme.
          pack="target/${{ matrix.target }}/release/host-lint-ffmpeg"
          [ -f "$pack.exe" ] && pack="$pack.exe"
          cp "$pack" "$(echo "${{ matrix.name }}" | sed 's/^host-lint-/host-lint-ffmpeg-/')"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            host-lint-ffmpeg-*

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run conformance gates
        run: |
          chmod +x lint-skill.sh
          ./lint-skill.sh

  allium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install allium-cli (pinned 3.4.2)
        run: cargo install allium-cli --version 3.4.2
      - name: allium check
        run: allium check host-lint.allium
      - name: allium analyse
        run: allium analyse host-lint.allium
      - name: allium plan (test obligations)
        run: allium plan host-lint.allium
      - name: Install host-lifecycle (pinned)
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev d4ce47e142a25568b549e0d6995936fdbb8f137b
      - name: Lint obligations (dispositioned, exercises-linked, inputs not stale)
        # Offline gate: every obligation dispositioned + test/proof names present, every
        # test: carrying an `exercises=` link the named test actually references
        # (--strict-discharge, plan/0052), plus input-digest staleness (the rungs declare
        # `inputs=src/lib.rs`; the committed host-lint.obligations.digests ledger must
        # still match). The real proof re-run is the `kani` job's `--rederive` below
        # (call/0018, #8).
        run: host-lifecycle obligations host-lint.allium --tests tests --prove src --strict-discharge

  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Kani (pinned)
        run: |
          cargo install --locked kani-verifier --version 0.67.0
          cargo kani setup
      - name: Verify proof harnesses (code-conformance tier)
        run: cargo kani --output-format terse
      - name: Install allium-cli + host-prove + host-lifecycle (pinned)
        # `obligations` derives the obligations via `allium plan`, so allium-cli is
        # needed here too (not only in the allium job).
        run: |
          cargo install allium-cli --version 3.4.2
          cargo install --git https://github.com/connollydavid/host-prove --rev 91719aafdb7d425b3d2626b6ae019d8cd52ffe87
          cargo install --git https://github.com/connollydavid/host-lifecycle --rev d4ce47e142a25568b549e0d6995936fdbb8f137b
      - name: Discharge kani rungs by re-derivation (call/0018, #8)
        # The real discharge: re-run each kani: rung via host-prove and gate on PASS,
        # not name-presence. host-prove (on PATH) drives `cargo kani` per harness.
        run: host-lifecycle obligations host-lint.allium --tests tests --rederive .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Run proptest tests
        run: cargo test
      - name: Download static binary
        uses: actions/download-artifact@v4
        with:
          name: host-lint-linux-amd64
          path: .
      - name: Make executable
        run: chmod +x host-lint-linux-amd64
      - name: Run integration tests
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh ./host-lint-linux-amd64
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Gate the release on the verification ladder too: a tag must not ship with a red
    # spec (allium) or a red proof (kani), not only a failing build/test (plan/0055, V6).
    needs: [build, conformance, allium, kani, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: host-lint-*
          path: dist
          merge-multiple: true
      - name: Rebuild the certified x86_64-linux-musl asset in the pinned toolchain
        # The canonical reproducible artifact is built in the digest-pinned muslrust
        # image with the locked dependencies and recorded in .host-software (agentic-host),
        # where `software --verify-build` re-derives it byte-for-byte at re-pin. Build the
        # published linux-amd64 asset the same way (pinned image + --locked) so the
        # distributed binary is that artifact, not a stock-runner apt-musl build that can
        # differ in libc and linker (plan/0055, V7).
        run: |
          docker run --rm \
            -v "$PWD":/src -w /src -e RUSTUP_TOOLCHAIN=stable \
            clux/muslrust:1.95.0-stable@sha256:15a72a4abf1c593b0bea63a4a8f20e95c1e5a0696d7051eca87b9b850b2d7e43 \
            sh -c 'CARGO_INCREMENTAL=0 cargo build --release --locked --target x86_64-unknown-linux-musl'
          cp target/x86_64-unknown-linux-musl/release/host-lint dist/host-lint-linux-amd64
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
