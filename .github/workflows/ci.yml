name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: host-lint-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: host-lint-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: host-lint-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: host-lint-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: host-lint-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: host-lint-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/host-lint"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conformance gates
        run: |
          chmod +x lint-skill.sh
          ./lint-skill.sh

  allium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install allium-cli (pinned 3.4.2)
        run: cargo install allium-cli --version 3.4.2
      - name: allium check
        run: allium check host-lint.allium
      - name: allium analyse
        run: allium analyse host-lint.allium
      - name: allium plan (test obligations)
        run: allium plan host-lint.allium
      - name: Install host-lifecycle (pinned v0.18.1)
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev ca0dfe28cb99c20afe0420bf2f7cb3263550e019
      - name: Lint obligations (dispositioned, names present, inputs not stale)
        # Offline gate: every obligation dispositioned + test/proof names present, plus
        # input-digest staleness (the rungs declare `inputs=src/lib.rs`; the committed
        # host-lint.obligations.digests ledger must still match). The real proof re-run
        # is the `kani` job's `--rederive` below (call/0018, #8).
        run: host-lifecycle obligations host-lint.allium --tests tests --prove src

  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kani (pinned)
        run: |
          cargo install --locked kani-verifier --version 0.67.0
          cargo kani setup
      - name: Verify proof harnesses (code-conformance tier)
        run: cargo kani --output-format terse
      - name: Install allium-cli + host-prove + host-lifecycle (pinned)
        # `obligations` derives the obligations via `allium plan`, so allium-cli is
        # needed here too (not only in the allium job).
        run: |
          cargo install allium-cli --version 3.4.2
          cargo install --git https://github.com/connollydavid/host-prove --rev 91719aafdb7d425b3d2626b6ae019d8cd52ffe87
          cargo install --git https://github.com/connollydavid/host-lifecycle --rev ca0dfe28cb99c20afe0420bf2f7cb3263550e019
      - name: Discharge kani rungs by re-derivation (call/0018, #8)
        # The real discharge: re-run each kani: rung via host-prove and gate on PASS,
        # not name-presence. host-prove (on PATH) drives `cargo kani` per harness.
        run: host-lifecycle obligations host-lint.allium --tests tests --rederive .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run proptest tests
        run: cargo test
      - name: Download static binary
        uses: actions/download-artifact@v4
        with:
          name: host-lint-linux-amd64
          path: .
      - name: Make executable
        run: chmod +x host-lint-linux-amd64
      - name: Run integration tests
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh ./host-lint-linux-amd64
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, conformance, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: host-lint-*
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
