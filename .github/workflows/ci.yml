name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: no-phase-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: no-phase-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: no-phase-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: no-phase-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: no-phase-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: no-phase-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/no-phase"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conformance gates
        run: |
          chmod +x lint-skill.sh
          ./lint-skill.sh

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run proptest tests
        run: cargo test
      - name: Download static binary
        uses: actions/download-artifact@v4
        with:
          name: no-phase-linux-amd64
          path: .
      - name: Make executable
        run: chmod +x no-phase-linux-amd64
      - name: Run integration tests
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh ./no-phase-linux-amd64
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, conformance, test]
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: no-phase-*
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
